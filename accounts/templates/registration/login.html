{% extends 'blogs/base.html' %}

{% block content %}
  {% if form.errors %}
    <p>Your username and password didn't match. Please try again, but do it better.</p>
  {% endif %}

  <form action="{% url 'accounts:login' %}" method='post'>
      {% csrf_token %}
      {{ form.as_p }}

    <button type="submit" class="btn btn-dark">log in</button>
  </form>

{% endblock content %}
